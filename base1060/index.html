    <h2>Conversion Examples:</h2>
    <div>
        <p>1024 = <img class="digit d17"><img class="digit d4"></p>
        <p>2048 = <img class="digit d34"><img class="digit d8"></p>
        <p>4096 = <img class="digit d1"><img class="digit d8"><img class="digit d16"></p>
        <p>8192 = <img class="digit d2"><img class="digit d16"><img class="digit d32"></p>
        <p>16384 = <img class="digit d4"><img class="digit d33"><img class="digit d4"></p>
        <p>32768 = <img class="digit d9"><img class="digit d6"><img class="digit d8"></p>
    </div>
    </div>
    <div>
        <input type="number" name="nubmer" min="1" max="1073741824" value="16777216" id="number">
        <button id="converter">Convert to 10-60 base</button>
        <div id="out" style="margin-top: 20px;"></div>
    </div>
    <script>
        document.getElementById("converter").addEventListener('click', (e) => {
            e.preventDefault();
            let value = document.getElementById("number").value
            let num = Number(value);

            let remainders = [];
            while (num > 59) {
                let div = num / 60;
                let floored = Math.floor(div);
                let rem = num - (60 * floored);
                remainders.unshift(rem);
                num = floored;
            }
            if (num > 0) {
                remainders.unshift(num);
            }

            let ourHTML = "";

            for (const rem of remainders) {
                ourHTML += `<img class="digit d${rem}">`
            }

            //convert num to base 60
            document.getElementById("out").innerHTML = ourHTML;
        });
    </script>
