        <p>

    </div>
    <div>
        <input type="number" name="number" min="1" max="1073741824" value="16777216" id="number">
        <button id="converter">Convert to 10-60 base</button>
    </div>
    <div>
        <p style="font-size: 1.25rem;">(Integer numbers between 1 and 1073741824 are accepted)</p>
    </div>
    <div style="margin-top: 20px;">
        <digit-display id="out" val="16777216"></digit-display>
    </div>

    <script src="digit.js"></script>
    <script src="digit_display.js"></script>
    <script>
        //output display
        const output = document.getElementById("out");
        //input element
        const input = document.getElementById("number");
        const convert = (event) => {
            event.preventDefault();
            let value = document.getElementById("number").value
            let num = Number(value);

            //convert num to base 60
            //element does the conversion
            output.value = num;
        };

        //some variance in default input value shown
        input.value = "16777216";

        let trem = Date.now() % 100;

        if (trem >= 51 && trem <= 90) {
            input.value = "16777777";
            output.value = "16777777";
        }
        if (trem >= 10 && trem <= 50) {
            input.value = "16778000";
            output.value = "16778000";
        }

        document.getElementById("converter").addEventListener('click', convert);
    </script>
