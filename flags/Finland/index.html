<!DOCTYPE html>
<title>Flags</title>
<meta charset="UTF-8" />
<style>
    .blue {
        background-color: rgb(0, 47, 108);
    }

    .line {
        position: absolute;
        border: none;
        margin: 0px;
        padding: 0px;
    }

    #line1 {
        animation-delay: 2s;
        animation-name: linef1;
        animation-duration: 3s;
        animation-fill-mode: both;
        animation-iteration-count: 1;
    }

    #line2 {
        animation-delay: 5s;
        animation-duration: 3s;
        animation-name: linef2;
        animation-fill-mode: both;
        animation-iteration-count: 1;
    }

    @media screen and (max-aspect-ratio:179/110) {
        #line1 {
            left: 0vw;
            top: 22vw;
            height: 16.5vw;
            /* width: 99vw; */
            width: 100vw;
        }

        @keyframes linef1 {
            0% {
                width: 0vw;
            }

            100% {
                /* width: 99vw; */
                width: 100vw;
            }
        }

        #line2 {
            left: 27.5vw;
            top: 0vw;
            width: 16.5vw;
            height: 60.5vw;
        }

        @keyframes linef2 {
            from {
                height: 0vw;
            }

            to {
                height: 66vw;
            }
        }

    }

    @media screen and (min-aspect-ratio:180/110) {
        #line1 {
            left: 0vh;
            top: 36.35vh;
            height: 27.3vh;
            /* width: 180vh; */
            width: 100vw;
        }

        @keyframes linef1 {
            0% {
                width: 0vh;
            }

            100% {
                /* width: 180vh; */
                width: 100vw;
            }
        }

        #line2 {
            left: 45.5vh;
            top: 0vh;
            width: 27.3vh;
            height: 100vh;
        }

        @keyframes linef2 {
            from {
                height: 0vh;
            }

            to {
                height: 100vh;
            }
        }
    }
</style>

<body>
    <div id="line1" class="blue line"></div>
    <div id="line2" class="blue line"></div>
</body>
