<!DOCTYPE html>
<title>Flags</title>
<meta charset="UTF-8" />
<style>
    :root {
        --blue: rgb(0, 87, 183);
        --yellow: rgb(255, 215, 0);
    }

    .xpander {
        animation-duration: 3s;
        animation-name: xpand;
        animation-fill-mode: forwards;
        animation-iteration-count: 1;
        display: block;
        width: 100%;
        border: none;
        margin: 0px;
        padding: 0px;
    }

    #block1 {
        background-color: var(--blue);
        position: absolute;
        top: 0vh;
        left: 0px;

    }

    #block2 {
        background-color: var(--yellow);
        position: absolute;
        right: 0px;
        top: 50vh;
        animation-delay: 4s;
    }

    @keyframes xpand {
        0% {
            width: 0%;
            height: 50vh;
        }

        100% {
            width: 100%;
            height: 50vh;
        }
    }
</style>

<body>
    <div id="block1" class="xpander"></div>
    <div id="block2" class="xpander"></div>
</body>
