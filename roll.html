<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Roll wheel Demo</title>
    <style>
        #main {
            width: 480px;
            height: 360px;
            border: 4px solid black;
        }

        .circle {
            border: 5px solid black;
            border-radius: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .stick {
            width: 10px;
            height: 10px;
            border: 1px solid black;
            background-color: black;
        }

        #frame {
            width: 50px;
            height: 50px;
            flex-direction: row;
            animation: roll 6s infinite;
        }

        #center {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #inner {
            width: 18px;
            height: 18px;
        }

        @keyframes roll {
            0% {
                transform: translateX(0px, -1px)rotate(0deg);
            }

            10% {
                transform: translateX(140px, -1px) rotate(360deg);
            }

            20% {
                transform: translate(280px, -1px) rotate(720deg);
            }

            30% {
                transform: translate(421px, -1px) rotate(1080deg);
            }

            35% {
                transform: translate(421px, 10px) rotate(0deg);
            }

            40% {
                transform: translate(421px, 100px) rotate(-180deg);
            }

            50% {
                transform: translate(421px, 200px) rotate(-360deg);
            }

            60% {
                transform: translate(421px, 301px) rotate(-540deg);
            }

            70% {
                transform: translate(280px, 301px) rotate(-720deg);
            }

            80% {
                transform: translate(140px, 301px) rotate(-900deg);
            }

            90% {
                transform: translate(-1px, 301px) rotate(-1080deg);
            }

            95% {
                transform: translate(-1px, 200px) rotate(-1260deg);
            }

            97.5% {
                transform: translate(-1px, 100px) rotate(-1350deg);
            }

            100% {
                transform: translate(-1px, -1px) rotate(-1440deg);
            }
        }
    </style>
</head>

<body>
    <div id="main">
        <div class="circle" id="frame">
            <div class="stick"></div>
            <div id="center">
                <div class="stick"></div>
                <div class="circle" id="inner"></div>
                <div class="stick"></div>
            </div>
            <div class="stick"></div>
        </div>
    </div>

</body>

</html>
